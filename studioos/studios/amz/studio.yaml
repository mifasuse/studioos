id: amz
display_name: "Amazon Arbitrage Studio"
mission: "Monitor Amazon listings, detect pricing opportunities, and (in future phases) execute repricing and ad optimization."
status: active
templates:
  - id: amz_monitor
    version: 1
    display_name: "AMZ Price Monitor"
    description: "Polls PriceFinder for a watchlist of ASINs and records price observations + anomalies"
    workflow_ref: amz_monitor
  - id: amz_analyst
    version: 1
    display_name: "AMZ Analyst"
    description: "LLM-backed classifier for price anomalies — confirms opportunities or rejects noise"
    workflow_ref: amz_analyst
  - id: amz_executor
    version: 1
    display_name: "AMZ Executor"
    description: "Relays confirmed opportunities to Telegram (phase 1, notify-only)"
    workflow_ref: amz_executor
  - id: amz_scout
    version: 1
    display_name: "AMZ Scout"
    description: "Periodic PriceFinder scan for new high-ROI opportunities, sends a Telegram digest"
    workflow_ref: amz_scout
  - id: amz_pricer
    version: 1
    display_name: "AMZ Pricer"
    description: "Periodic BuyBoxPricer scan for lost-buybox listings, recommends reprices to Telegram"
    workflow_ref: amz_pricer
agents:
  - id: amz-monitor
    template_id: amz_monitor
    template_version: 1
    display_name: "AMZ Monitor"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 30m"
    goals:
      anomaly_threshold_pct: 2.0
      watchlist_strategy: top_opportunities
      watchlist_params:
        limit: 20
        min_profit_dollars: 20.0
        min_margin_pct: 40.0
    tool_scope:
      - pricefinder.db.top_opportunities
      - pricefinder.db.lookup_asins
      - pricefinder.lookup_asin
      - memory.search
      - budget.check
  - id: amz-analyst
    template_id: amz_analyst
    template_version: 1
    display_name: "AMZ Analyst"
    mode: normal
    heartbeat_config: {}
    goals:
      accept_confidence_min: 0.5
    tool_scope:
      - llm.chat
      - pricefinder.db.lookup_asins
      - memory.search
      - kpi.read
      - budget.check
  - id: amz-executor
    template_id: amz_executor
    template_version: 1
    display_name: "AMZ Executor"
    mode: normal
    heartbeat_config: {}
    goals: {}
    tool_scope:
      - telegram.notify
      - memory.search
  - id: amz-scout
    template_id: amz_scout
    template_version: 1
    display_name: "AMZ Scout"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 6h"
    goals:
      scan_limit: 20
      min_roi_pct: 20.0
      max_sales_rank: 100000
      min_monthly_sold: 30
      min_rating: 3.5
      min_review_count: 10
    tool_scope:
      - pricefinder.db.scout_candidates
      - telegram.notify
      - memory.search
  - id: amz-pricer
    template_id: amz_pricer
    template_version: 1
    display_name: "AMZ Pricer"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 30m"
    goals:
      scan_limit: 25
      underbid_pct: 1.0
    tool_scope:
      - buyboxpricer.db.lost_buybox
      - telegram.notify
      - memory.search
subscriptions:
  - subscriber: amz-analyst
    event_pattern: "amz.price.anomaly_detected"
    priority: 30
  - subscriber: amz-executor
    event_pattern: "amz.opportunity.confirmed"
    priority: 20
