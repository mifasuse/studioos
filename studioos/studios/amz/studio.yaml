id: amz
display_name: "Amazon Arbitrage Studio"
mission: "Monitor Amazon listings, detect pricing opportunities, and (in future phases) execute repricing and ad optimization."
status: active
templates:
  - id: amz_monitor
    version: 1
    display_name: "AMZ Price Monitor"
    description: "Polls PriceFinder for a watchlist of ASINs and records price observations + anomalies"
    workflow_ref: amz_monitor
  - id: amz_analyst
    version: 1
    display_name: "AMZ Analyst"
    description: "LLM-backed classifier for price anomalies — confirms opportunities or rejects noise"
    workflow_ref: amz_analyst
  - id: amz_executor
    version: 1
    display_name: "AMZ Executor"
    description: "Relays confirmed opportunities to Telegram (phase 1, notify-only)"
    workflow_ref: amz_executor
  - id: amz_scout
    version: 1
    display_name: "AMZ Scout"
    description: "Periodic PriceFinder scan for new high-ROI opportunities, sends a Telegram digest"
    workflow_ref: amz_scout
  - id: amz_pricer
    version: 1
    display_name: "AMZ Pricer"
    description: "Periodic BuyBoxPricer scan for lost-buybox listings, recommends reprices to Telegram"
    workflow_ref: amz_pricer
  - id: amz_reflector
    version: 1
    display_name: "AMZ Reflector"
    description: "Daily learning loop — summarises last 24h of activity via MiniMax and sends a morning reflection"
    workflow_ref: amz_reflector
  - id: amz_repricer
    version: 1
    display_name: "AMZ Repricer"
    description: "Approval-gated executor for reprice recommendations; calls BuyBoxPricer's run-single engine when granted (dry-run by default)"
    workflow_ref: amz_repricer
  - id: studio_pruner
    version: 1
    display_name: "Memory Pruner"
    description: "Weekly memory garbage collection — drops low-importance, old, unused semantic memories"
    workflow_ref: studio_pruner
  - id: amz_ceo
    version: 1
    display_name: "AMZ CEO"
    description: "Weekly meta orchestrator — reads the last 7 days of activity + active playbook and posts a strategic brief to Slack and Telegram"
    workflow_ref: amz_ceo
  - id: amz_qa
    version: 1
    display_name: "AMZ QA"
    description: "Hourly health smoke test against pricefinder/buyboxpricer/adsoptimizer/ebaycrosslister; reports PASS/FAIL"
    workflow_ref: amz_qa
  - id: amz_crosslister
    version: 1
    display_name: "AMZ CrossLister"
    description: "Surfaces ASINs where eBay sells meaningfully above Amazon buybox; notify-only"
    workflow_ref: amz_crosslister
  - id: amz_admanager
    version: 1
    display_name: "AMZ AdManager"
    description: "Surfaces high-traffic well-rated ASINs worth running PPC ads on; notify-only"
    workflow_ref: amz_admanager
  - id: amz_analyst_daily
    version: 1
    display_name: "AMZ Analyst Daily"
    description: "Daily top-10 opportunity report with profit/risk scoring in CEO 9-field format"
    workflow_ref: amz_analyst_daily
  - id: amz_dev
    version: 1
    display_name: "AMZ Dev"
    description: "Hourly engineering pulse — failed runs, deploy state, system health summary"
    workflow_ref: amz_dev
agents:
  - id: amz-monitor
    template_id: amz_monitor
    template_version: 1
    display_name: "AMZ Monitor"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 30m"
    goals:
      anomaly_threshold_pct: 2.0
      watchlist_strategy: top_opportunities
      watchlist_params:
        limit: 20
        min_profit_dollars: 20.0
        min_margin_pct: 40.0
    tool_scope:
      - pricefinder.db.top_opportunities
      - pricefinder.db.lookup_asins
      - pricefinder.lookup_asin
      - memory.search
      - budget.check
  - id: amz-analyst
    template_id: amz_analyst
    template_version: 1
    display_name: "AMZ Analyst"
    mode: normal
    heartbeat_config: {}
    goals:
      accept_confidence_min: 0.5
    tool_scope:
      - llm.chat
      - pricefinder.db.lookup_asins
      - pricefinder.db.global_settings
      - memory.search
      - kpi.read
      - budget.check
  - id: amz-executor
    template_id: amz_executor
    template_version: 1
    display_name: "AMZ Executor"
    mode: normal
    heartbeat_config: {}
    goals: {}
    tool_scope:
      - telegram.notify
      - memory.search
  - id: amz-scout
    template_id: amz_scout
    template_version: 1
    display_name: "AMZ Scout"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 6h"
    goals:
      scan_limit: 20
      min_roi_pct: 20.0
      max_roi_pct: 1000.0
      max_sales_rank: 100000
      min_monthly_sold: 30
      min_rating: 3.5
      min_review_count: 10
      min_profit_dollars: 10.0
      min_tr_price: 5.0
    tool_scope:
      - pricefinder.db.scout_candidates
      - telegram.notify
      - memory.search
  - id: amz-pricer
    template_id: amz_pricer
    template_version: 1
    display_name: "AMZ Pricer"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 30m"
    goals:
      scan_limit: 25
      aging_limit: 25
      min_age_days: 90
      underbid_pct: 1.0
    tool_scope:
      - buyboxpricer.db.lost_buybox
      - buyboxpricer.db.aging_inventory
      - buyboxpricer.db.backfill_acquisition_cost
      - telegram.notify
      - memory.search
  - id: amz-reflector
    template_id: amz_reflector
    template_version: 1
    display_name: "AMZ Reflector"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 24h"
    goals:
      window_hours: 24
    tool_scope:
      - llm.chat
      - telegram.notify
      - memory.search
  - id: amz-repricer
    template_id: amz_repricer
    template_version: 1
    display_name: "AMZ Repricer"
    mode: normal
    heartbeat_config: {}
    goals:
      dry_run: false
    tool_scope:
      - buyboxpricer.api.run_single_repricing
      - telegram.notify
      - memory.search
  - id: amz-ceo
    template_id: amz_ceo
    template_version: 1
    display_name: "AMZ CEO"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "0 9 * * *"
    goals:
      llm_provider: minimax
    tool_scope:
      - llm.chat
      - telegram.notify
      - slack.notify
      - memory.search
      - kpi.read
  - id: amz-qa
    template_id: amz_qa
    template_version: 1
    display_name: "AMZ QA"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 1h"
    goals: {}
    tool_scope:
      - http.get_json
      - http.post_json
      - http.post_form
      - telegram.notify
      - slack.notify
      - memory.search
  - id: amz-crosslister
    template_id: amz_crosslister
    template_version: 1
    display_name: "AMZ CrossLister"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 6h"
    goals:
      scan_limit: 30
      auto_list_stranded: true
    tool_scope:
      - ebaycrosslister.db.listable_items
      - ebaycrosslister.db.stranded_inventory
      - ebaycrosslister.api.create_draft
      - ebaycrosslister.api.publish_listing
      - pricefinder.db.crosslist_candidates
      - telegram.notify
      - slack.notify
      - memory.search
  - id: amz-admanager
    template_id: amz_admanager
    template_version: 1
    display_name: "AMZ AdManager"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 6h"
    goals:
      scan_limit: 15
      min_monthly_sold: 50
      min_reviews: 50
      min_rating: 4.0
      max_competitors: 15
    tool_scope:
      - adsoptimizer.db.list_campaigns
      - pricefinder.db.ad_candidates
      - telegram.notify
      - slack.notify
      - memory.search
  - id: amz-analyst-daily
    template_id: amz_analyst_daily
    template_version: 1
    display_name: "AMZ Analyst Daily"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "0 7 * * *"
    goals:
      top_n: 10
      min_profit_dollars: 5.0
      min_margin_pct: 20.0
    tool_scope:
      - pricefinder.db.top_opportunities
      - pricefinder.db.global_settings
      - telegram.notify
      - slack.notify
      - memory.search
  - id: amz-pruner
    template_id: studio_pruner
    template_version: 1
    display_name: "AMZ Memory Pruner"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "0 4 * * 0"
    goals:
      min_age_days: 30
      min_unused_days: 14
      importance_threshold: 0.3
      dry_run: false
    tool_scope:
      - telegram.notify
      - memory.search
  - id: amz-dev
    template_id: amz_dev
    template_version: 1
    display_name: "AMZ Dev"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 1h"
    goals:
      repos:
        - /srv/projects/pricefinder
        - /srv/projects/buyboxpricer
        - /srv/projects/adsoptimizer
        - /home/deployer/ebaycrosslister
    tool_scope:
      - exec.git_status
      - exec.git_log
      - exec.docker_compose_ps
      - exec.git_commit
      - exec.git_push
      - exec.gh_workflow_dispatch
      - http.get_json
      - telegram.notify
      - slack.notify
      - memory.search
subscriptions:
  - subscriber: amz-analyst
    event_pattern: "amz.price.anomaly_detected"
    priority: 30
  - subscriber: amz-analyst
    event_pattern: "amz.opportunity.discovered"
    priority: 40
  - subscriber: amz-executor
    event_pattern: "amz.opportunity.confirmed"
    priority: 20
  - subscriber: amz-repricer
    event_pattern: "amz.reprice.recommended"
    priority: 25
  # CEO delegation: each agent listens for its own task type.
  - subscriber: amz-monitor
    event_pattern: "amz.task.monitor"
    priority: 15
  - subscriber: amz-scout
    event_pattern: "amz.task.scout"
    priority: 15
  - subscriber: amz-analyst
    event_pattern: "amz.task.analyst"
    priority: 15
  - subscriber: amz-pricer
    event_pattern: "amz.task.pricer"
    priority: 15
  - subscriber: amz-repricer
    event_pattern: "amz.task.repricer"
    priority: 15
  - subscriber: amz-crosslister
    event_pattern: "amz.task.crosslister"
    priority: 15
  - subscriber: amz-admanager
    event_pattern: "amz.task.admanager"
    priority: 15
  - subscriber: amz-qa
    event_pattern: "amz.task.qa"
    priority: 15
  - subscriber: amz-dev
    event_pattern: "amz.task.dev"
    priority: 15
  # QA also wakes on deploy notifications so smoke runs after every push.
  - subscriber: amz-qa
    event_pattern: "amz.deploy.notification"
    priority: 10
  # Cross-agent: QA fail → Dev alerted (CEO learns via daily brief, not per-event)
  - subscriber: amz-dev
    event_pattern: "amz.qa.smoke_failed"
    priority: 10
  # Note: cross-agent subscriptions (pricer←confirmed, crosslister←reprice)
  # removed — they caused cascade loops. Agents rely on their own schedules
  # + CEO daily delegation for coordination.
