id: app-studio
display_name: "App Studio"
mission: "Mobile app portfolio: monitor metrics across the published apps, surface anomalies, and drive pricing/marketing experiments via approval gates."
status: active
templates:
  - id: app_studio_pulse
    version: 1
    display_name: "App Studio Pulse"
    description: "Daily heartbeat — sends a Telegram digest of currently-tracked apps and any KPI-bearing observations from the platform"
    workflow_ref: app_studio_pulse
  - id: app_studio_reflector
    version: 1
    display_name: "App Studio Reflector"
    description: "Daily reflection scoped to studio_id=app-studio. Reuses the AMZ reflector pattern via a shared base."
    workflow_ref: app_studio_reflector
  - id: studio_pruner
    version: 1
    display_name: "Memory Pruner"
    description: "Weekly memory garbage collection"
    workflow_ref: studio_pruner
  - id: app_studio_dev
    version: 1
    display_name: "App Studio Dev"
    description: "Hourly build pulse — git status, failure count, Slack report"
    workflow_ref: app_studio_dev
  - id: app_studio_qa
    version: 1
    display_name: "App Studio QA"
    description: "Health check agent — Hub API overview, failure rate, PASS/FAIL verdict"
    workflow_ref: app_studio_qa
  - id: app_studio_marketing
    version: 1
    display_name: "Marketing"
    description: "Daily campaign monitoring + country ROI analysis"
    workflow_ref: app_studio_marketing
  - id: app_studio_hub_dev
    version: 1
    display_name: "Hub Dev"
    description: "Hub service health pulse"
    workflow_ref: app_studio_hub_dev
  - id: app_studio_growth_intel
    version: 1
    display_name: "Growth Intelligence"
    description: "Weekly funnel report + anomaly detection + product discovery"
    workflow_ref: app_studio_growth_intel
  - id: app_studio_growth_exec
    version: 1
    display_name: "Growth Execution"
    description: "Experiment design and launch — Fast Lane vs CEO Lane"
    workflow_ref: app_studio_growth_exec
  - id: app_studio_ceo
    version: 1
    display_name: "App Studio CEO"
    description: "Weekly strategic decisions, KPI tracking, task delegation"
    workflow_ref: app_studio_ceo
  - id: app_studio_pricing
    version: 1
    display_name: "Pricing"
    description: "Country-based pricing analysis and A/B test planning"
    workflow_ref: app_studio_pricing
agents:
  - id: app-studio-pulse
    template_id: app_studio_pulse
    template_version: 1
    display_name: "App Studio Pulse"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 24h"
    goals:
      tracked_apps: [quit_smoking, sms_forward, moodmate, notification_filter]
    tool_scope:
      - telegram.notify
      - memory.search
  - id: app-studio-reflector
    template_id: app_studio_reflector
    template_version: 1
    display_name: "App Studio Reflector"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 24h"
    goals:
      window_hours: 24
      llm_provider: minimax
    tool_scope:
      - llm.chat
      - telegram.notify
      - memory.search
  - id: app-studio-pruner
    template_id: studio_pruner
    template_version: 1
    display_name: "App Studio Memory Pruner"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "0 4 * * 0"
    goals:
      min_age_days: 30
      min_unused_days: 14
      importance_threshold: 0.3
      dry_run: false
    tool_scope:
      - telegram.notify
      - memory.search
  - id: app-studio-growth-intel
    template_id: app_studio_growth_intel
    template_version: 1
    display_name: "Growth Intelligence"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "0 8 * * *"
    goals:
      tracked_apps: [quit_smoking, sms_forward, moodmate, notification_filter]
      anomaly_thresholds:
        min_roi: 1.0
        max_churn_rate: 15.0
        min_retention_d7: 20.0
        max_mrr_drop_pct: 20.0
    tool_scope:
      - hub.api.overview
      - hub.api.metrics
      - llm.chat
      - slack.notify
      - telegram.notify
      - memory.search
      - nitter.search
      - web.search
  - id: app-studio-growth-exec
    template_id: app_studio_growth_exec
    template_version: 1
    display_name: "Growth Execution"
    mode: normal
    heartbeat_config: {}
    goals: {}
    tool_scope:
      - llm.chat
      - slack.notify
      - telegram.notify
      - memory.search
  - id: app-studio-ceo
    template_id: app_studio_ceo
    template_version: 1
    display_name: "App Studio CEO"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "0 9 * * *"
    goals:
      tracked_apps: [quit_smoking, sms_forward, moodmate, notification_filter]
    tool_scope:
      - hub.api.overview
      - hub.api.overview_all
      - hub.api.metrics
      - exec.codemagic_status
      - slack.notify
      - telegram.notify
      - memory.search
      - kpi.read
  - id: app-studio-pricing
    template_id: app_studio_pricing
    template_version: 1
    display_name: "Pricing"
    mode: normal
    heartbeat_config: {}
    goals: {}
    tool_scope:
      - hub.api.overview
      - hub.api.metrics
      - llm.chat
      - slack.notify
      - telegram.notify
      - memory.search
  - id: app-studio-dev
    template_id: app_studio_dev
    template_version: 1
    display_name: "App Studio Dev"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 1h"
    goals:
      repos:
        - /home/deployer/openclaw/workspace/workspace/studios/app-studio/projects/quit_smoking_now
        - /home/deployer/openclaw/workspace/workspace/studios/app-studio/projects/sms_forward
        - /home/deployer/openclaw/workspace/workspace/studios/app-studio/projects/moodmate
        - /home/deployer/openclaw/workspace/workspace/studios/app-studio/projects/notification_filter
      codemagic_apps:
        quit_smoking_now:
          app_id: "69c0186211a3275017fb6926"
          workflows: [ios-testflight, ios-appstore]
        sms_forward:
          app_id: "69c1a987c18c3eee6b5c64f8"
          workflows: [android-debug, android-release]
        notification_filter:
          app_id: "69c76843b8d0d6c344bbaa25"
          workflows: [android-debug]
    tool_scope:
      - exec.git_status
      - exec.git_log
      - exec.read_file
      - exec.list_dir
      - exec.git_commit
      - exec.git_push
      - exec.gh_workflow_dispatch
      - exec.codemagic_trigger
      - exec.codemagic_status
      - telegram.notify
      - slack.notify
      - memory.search
  - id: app-studio-qa
    template_id: app_studio_qa
    template_version: 1
    display_name: "App Studio QA"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 6h"
    goals:
      tracked_apps: [quit_smoking, sms_forward, moodmate, notification_filter]
      failure_rate_threshold: 20.0
    tool_scope:
      - hub.api.overview
      - exec.codemagic_status
      - exec.read_file
      - exec.list_dir
      - telegram.notify
      - slack.notify
      - memory.search
  - id: app-studio-marketing
    template_id: app_studio_marketing
    template_version: 1
    display_name: "Marketing"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 24h"
    goals:
      tracked_apps: [quit_smoking, sms_forward, moodmate, notification_filter]
      min_roi: 0
    tool_scope:
      - hub.api.campaigns
      - hub.api.metrics
      - slack.notify
      - telegram.notify
      - memory.search
      - web.search
  - id: app-studio-hub-dev
    template_id: app_studio_hub_dev
    template_version: 1
    display_name: "Hub Dev"
    mode: normal
    heartbeat_config: {}
    schedule_cron: "@every 6h"
    goals:
      repos: []
    tool_scope:
      - exec.git_status
      - exec.git_log
      - telegram.notify
      - slack.notify
      - memory.search
subscriptions:
  # Growth Exec triggered by CEO delegation only (not weekly_report directly,
  # to avoid duplicate runs when CEO also delegates after reading the report)
  - subscriber: app-studio-growth-exec
    event_pattern: "app.task.growth_exec"
    priority: 20
  - subscriber: app-studio-pricing
    event_pattern: "app.task.pricing"
    priority: 20
  - subscriber: app-studio-growth-intel
    event_pattern: "app.task.growth_intel"
    priority: 20
  - subscriber: app-studio-dev
    event_pattern: "app.task.dev"
    priority: 20
  - subscriber: app-studio-qa
    event_pattern: "app.task.qa"
    priority: 20
  # Cross-agent: anomaly → pricing immediately notified (CEO learns via daily brief)
  - subscriber: app-studio-pricing
    event_pattern: "app.growth.anomaly_detected"
    priority: 15
  # Cross-agent: QA fail → dev alerted
  - subscriber: app-studio-dev
    event_pattern: "app.qa.failed"
    priority: 10
