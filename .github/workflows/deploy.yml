name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deployer
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            REPO_DIR=/home/deployer/studioos
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/mifasuse/studioos.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git pull origin main

            # Ensure .env exists (first deploy); operator updates secrets manually
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "STUDIOOS_ENV=production" >> .env
            fi

            docker compose up -d --build postgres studioos
            sleep 8
            docker compose exec -T studioos uv run alembic upgrade head
            docker compose exec -T studioos uv run studioos init
            docker compose ps

            # Fire amz.deploy.notification so amz-qa runs a smoke test
            # automatically. Non-fatal — if studioos isn't responding yet
            # the deploy still counts as successful.
            COMMIT_SHORT=$(git rev-parse --short HEAD)
            curl -sS -X POST http://127.0.0.1:8100/events/ingest \
              -H "Content-Type: application/json" \
              -d "{\"event_type\": \"amz.deploy.notification\", \"studio_id\": \"amz\", \"source\": \"github-actions\", \"payload\": {\"service\": \"studioos\", \"commit\": \"$COMMIT_SHORT\", \"success\": true, \"deployed_by\": \"github-actions\"}}" \
              || echo "[warn] deploy notification failed"
