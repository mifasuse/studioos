services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: studioos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: studioos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studioos}
      POSTGRES_DB: studioos
    ports:
      - "5433:5432"
    volumes:
      - studioos-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studioos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studioos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - studioos-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  studioos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studioos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studioos.rule=Host(`studioos.mifasuse.com`)"
      - "traefik.http.routers.studioos.entrypoints=https"
      - "traefik.http.routers.studioos.tls.certresolver=letsencrypt"
      - "traefik.http.services.studioos.loadbalancer.server.port=8000"
    env_file:
      - .env
    environment:
      STUDIOOS_DATABASE_URL: postgresql+asyncpg://studioos:${POSTGRES_PASSWORD:-studioos}@postgres:5432/studioos
      STUDIOOS_TEST_DATABASE_URL: postgresql+asyncpg://studioos:${POSTGRES_PASSWORD:-studioos}@postgres:5432/studioos_test
      STUDIOOS_REDIS_URL: redis://redis:6379/0
      STUDIOOS_BUS_BACKEND: redis
      STUDIOOS_BUYBOXPRICER_DB_URL: postgresql+asyncpg://studioos_ro:91f0778325ffed7c8320f866a7597fa07ebf80b8d4af2b9e@buyboxpricer-db:5432/buyboxpricer
    ports:
      - "8100:8000"
    volumes:
      # Read-only access to the supporting projects so the dev tools
      # (git_status, git_log, docker compose ps) can work.
      - /srv/projects:/srv/projects:ro
      - /home/deployer/ebaycrosslister:/home/deployer/ebaycrosslister:ro
      - /home/deployer/openclaw/workspace/workspace/studios/app-studio/projects:/home/deployer/openclaw/workspace/workspace/studios/app-studio/projects:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - traefik-public
      - buyboxpricer_buyboxpricer-network
      - adsoptimizer_adsoptimizer-network
      - ebaycrosslister_ebaycrosslister-network

volumes:
  studioos-pgdata:
    driver: local
  studioos-redis:
    driver: local

networks:
  default:
    name: studioos-net
  traefik-public:
    external: true
  buyboxpricer_buyboxpricer-network:
    external: true
  adsoptimizer_adsoptimizer-network:
    external: true
  ebaycrosslister_ebaycrosslister-network:
    external: true
